apiVersion: v1
kind: Service
metadata:
  name: mysql
  annotations:
    # PreSync の migration Job より先に MySQL を起動するため PreSync の先行 wave で適用する
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
spec:
  selector:
    app.kubernetes.io/name: mysql
  ports:
    - port: 3306
      targetPort: 3306
