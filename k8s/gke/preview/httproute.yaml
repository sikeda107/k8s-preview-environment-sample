apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextjs
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-infra
  # ApplicationSet が PR 番号で上書きするプレースホルダー
  hostnames:
    - pr-0.preview.example.com
  rules:
    - backendRefs:
        - name: nextjs
          port: 80
