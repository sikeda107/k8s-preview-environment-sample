apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ApplicationSet が pr-PR番号 に上書きし Namespace リソース名も書き換わるプレースホルダー
namespace: pr-0

resources:
  - ../../base
  - namespace.yaml
  - httproute.yaml

images:
  - name: nextjs
    # ApplicationSet が実際の Artifact Registry パスとタグに上書きするプレースホルダー
    newName: asia-northeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/nextjs
    newTag: IMAGE_TAG

patches:
  - target:
      kind: ConfigMap
      name: nextjs-config
    patch: |-
      - op: replace
        path: /data/GOOGLE_CLOUD_PROJECT
        value: preview-project
      - op: replace
        path: /data/TASK_HANDLER_BASE_URL
        # Cloud Tasks から外部 URL 経由で到達させるため ApplicationSet が PR 番号で上書きする
        value: https://pr-0.preview.example.com
