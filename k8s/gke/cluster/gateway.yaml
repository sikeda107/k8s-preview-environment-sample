apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: gateway-infra
  annotations:
    # Terraform で作成した Certificate Manager の certificate map を参照する
    networking.gke.io/certmap: preview-cert-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    # Terraform で作成したグローバル静的 IP を参照する
    - type: NamedAddress
      value: preview-gateway-ip
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.preview.example.com"
      # certmap 利用時は tls セクション不要 Secret 方式の場合は tls.certificateRefs に Secret を指定する
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              # Preview 用 Namespace のみ Route の接続を許可する
              preview: "true"
    - name: http
      port: 80
      protocol: HTTP
      hostname: "*.preview.example.com"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              # Preview 用 Namespace のみ Route の接続を許可する
              preview: "true"
