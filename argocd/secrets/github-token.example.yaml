apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: argocd
# リポジトリを private にする場合のみ必要で applicationset.yaml の tokenRef コメントを外して使う
# コピーして実値を入れた github-token.yaml は .gitignore により誤 commit されない
stringData:
  # REPLACE_WITH_GITHUB_PAT を実際の Personal Access Token に差し替えて使う
  token: REPLACE_WITH_GITHUB_PAT
