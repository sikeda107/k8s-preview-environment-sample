apiVersion: v1
kind: Secret
metadata:
  name: repo-credentials
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
# private リポジトリ時のみ必要
# コピーして実値を入れた repo-credentials.yaml は .gitignore により誤 commit されない
stringData:
  type: git
  url: https://github.com/sikeda107/k8s-preview-environment-sample.git
  # REPLACE_WITH_GITHUB_USER を実際の GitHub ユーザー名に差し替えて使う
  username: REPLACE_WITH_GITHUB_USER
  # REPLACE_WITH_GITHUB_PAT を実際の Personal Access Token に差し替えて使う
  password: REPLACE_WITH_GITHUB_PAT
